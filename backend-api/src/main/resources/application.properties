spring.application.name=${APLICATION_NAME}
# --- CONEXIÃ“N A BASE DE DATOS ---
# Si la variable no existe, usarÃ¡ "postgres" y "localhost" por defecto
spring.datasource.username=${DATABASE_USERNAME_P:postgres}
spring.datasource.password=${DATABASE_PASSWORD_P:root}
spring.datasource.url=${DATABASE_URL_CHURNINSIGHT:jdbc:postgresql://localhost:5332/churn_db}
spring.datasource.driver-class-name=${DRIVER_POSTGRES}

# --- CONFIGURACIÃ“N EMAIL (Tarea BE-3) ---
# Usamos variables de entorno para no exponer credenciales en el cÃ³digo
spring.mail.host=${HOST_EMAIL_TEMP}
spring.mail.port=${PORT_EMAIL_TEMP}
spring.mail.username=${USERNAME_EMAIL_TEMP}
spring.mail.password=${PASSWORD_EMAIL_TEMP}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- CONFIGURACIï¿½N JPA / HIBERNATE ---

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.format-sql=true
# Hibernate 6 (Spring Boot 3) detecta el dialecto solo, pero puedes dejarlo:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- INTEGRACIï¿½N CON DATA SCIENCE (Tarea BE-4) ---
# Aquï¿½ configuramos la URL donde correrï¿½ el equipo de DS su FastAPI/Flask
# Por defecto serï¿½ localhost:8000 (puerto comï¿½n de Python)
api.ds.url=${DS_SERVICE_URL:http://localhost:8000/predict}

# --- DOCUMENTACIï¿½N SWAGGER ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.locations=classpath:db/migration

# Puerto del servidor
server.port=8080

